name: literature-agent
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      - openai>=1.0.0
      - anthropic>=0.34.0
      - arxiv>=1.4.0
      - PyYAML>=6.0
      - requests>=2.28.0

api_keys:
  openai_key: ""
  ieee_xplore: ""
  semantic_scholar: ""

openai:
  base_url: "https://api.openai.com/v1"
  model: "gpt-4o"

llm:
  temperature: 0.6
  max_tokens: 4096
  time_out: 600
  max_retries: 5
